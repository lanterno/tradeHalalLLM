repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      # Use the project's own mypy via uv so the hook agrees with CI on
      # version + dependencies. Defers to [tool.mypy] `files` in
      # pyproject.toml (strict on `domain/` + `core/`).
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        pass_filenames: false
        always_run: true

  - repo: local
    hooks:
      - id: block-secret-files
        name: block .env / halal_trader.db / *.pkl
        entry: bash -c 'for f in "$@"; do case "$f" in .env|halal_trader.db|*.pkl|backups/*) echo "Refusing to commit $f"; exit 1;; esac; done'
        language: system
        stages: [pre-commit]
        pass_filenames: true
