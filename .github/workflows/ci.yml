name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install dependencies (dev + all extras)
        run: uv sync --extra dev --extra all

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      - name: Type check (domain + core, strict)
        run: uv run mypy

      - name: Test (with coverage gate on domain + core)
        run: >
          uv run pytest -q
          --cov=src/halal_trader/domain
          --cov=src/halal_trader/core
          --cov-report=term-missing
          --cov-fail-under=85
