name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: halal_trader
          POSTGRES_USER: trader
          POSTGRES_PASSWORD: trader-dev-only
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U trader -d halal_trader"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # tests/conftest.py reads these to reach the service container.
      TEST_PG_HOST: localhost
      TEST_PG_PORT: "5433"
      TEST_PG_USER: trader
      TEST_PG_PASS: trader-dev-only
      TEST_PG_DB: halal_trader_test
      DATABASE_URL: postgresql+asyncpg://trader:trader-dev-only@localhost:5433/halal_trader

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install dependencies (dev + all extras)
        run: uv sync --extra dev --extra all

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      - name: Type check (domain + core, strict)
        run: uv run mypy

      - name: Apply Alembic migrations to runtime DB
        run: uv run halal-trader db migrate

      - name: Test (with coverage gate on domain + core)
        run: >
          uv run pytest -q
          --cov=src/halal_trader/domain
          --cov=src/halal_trader/core
          --cov-report=term-missing
          --cov-fail-under=85
