# Halal Trader — single-host Docker Compose deployment.
#
# Four services:
#   * postgres      — Postgres 16 + pgvector for the canonical DB.
#   * trader-crypto — the 24/7 crypto bot.
#   * trader-stocks — the market-hours stock bot.
#   * trader-web    — the FastAPI dashboard + Prometheus /metrics.
#
# All three bot services share the same Postgres instance — multi-bot
# concurrent writes are first-class now (no SQLite WAL limits).
#
# Optional Prometheus + Grafana sidecars are commented out — uncomment
# when an operator actually wants the dashboards. They scrape the
# /metrics endpoint exposed by the web service.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: halal-trader-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: halal_trader
      POSTGRES_USER: trader
      # Override in .env for prod; sane default for local dev.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader-dev-only}
    ports:
      - "5433:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d halal_trader"]
      interval: 5s
      timeout: 3s
      retries: 10

  trader-crypto:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      args:
        EXTRAS: "ml,sentiment"
    image: halal-trader:latest
    container_name: trader-crypto
    restart: unless-stopped
    env_file:
      - ../.env
    # Override the host's DATABASE_URL — inside the compose network the
    # bot reaches Postgres at the service hostname on its internal port.
    environment:
      DATABASE_URL: postgresql+asyncpg://trader:${POSTGRES_PASSWORD:-trader-dev-only}@postgres:5432/halal_trader
    volumes:
      - trader-data:/app/data
      - trader-logs:/app/logs
    command: ["halal-trader", "crypto", "start"]
    depends_on:
      postgres:
        condition: service_healthy

  trader-stocks:
    image: halal-trader:latest
    container_name: trader-stocks
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://trader:${POSTGRES_PASSWORD:-trader-dev-only}@postgres:5432/halal_trader
    volumes:
      - trader-data:/app/data
      - trader-logs:/app/logs
    command: ["halal-trader", "start"]
    depends_on:
      postgres:
        condition: service_healthy

  trader-web:
    image: halal-trader:latest
    container_name: trader-web
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://trader:${POSTGRES_PASSWORD:-trader-dev-only}@postgres:5432/halal_trader
    ports:
      - "8082:8082"
    volumes:
      - trader-data:/app/data
      - trader-logs:/app/logs
      # Mount the pre-built SPA so the FastAPI app can serve /
      - ../dashboard/dist:/app/dashboard/dist:ro
    command:
      - "uvicorn"
      - "halal_trader.web.app:create_app"
      - "--factory"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8082"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Optional observability stack ──
  # prometheus:
  #   image: prom/prometheus:latest
